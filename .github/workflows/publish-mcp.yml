name: Publish strongroom-mcp to npm

# npm-ONLY publisher for the @askalf/strongroom-mcp subpackage (mcp/). Separate
# from publish.yml because npm trusted publishing binds ONE trusted publisher
# per package to ONE exact workflow filename: @askalf/strongroom-mcp's publisher
# is bound to publish-mcp.yml, @askalf/strongroom's to publish.yml. Neither can
# authenticate as the other.
#
# Manual dispatch only — the mcp package version is bumped independently of the
# root package. Idempotent: if npm already has mcp/package.json's version, the
# run exits green without publishing, so it's safe to re-dispatch any time.

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: mcp

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted-publisher auth for npm publish
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Trusted publishing (OIDC) needs npm >=11.5.1; Node 24 bundles npm 11.
          # Runtime floor stays engines.node >=20 — ci.yml tests 20/22.
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Skip if npm already has this version
        id: gate
        run: |
          set -euo pipefail
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          published=$(npm view "${name}@${version}" version 2>/dev/null || echo "")
          if [ "$published" = "$version" ]; then
            echo "npm already has ${name}@${version}; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: steps.gate.outputs.skip != 'true'
      - run: npm test
        if: steps.gate.outputs.skip != 'true'
      # Auth = OIDC via the npmjs.com trusted publisher bound to THIS workflow
      # filename (publish-mcp.yml) — no NPM_TOKEN. Provenance is automatic under OIDC.
      - run: npm publish --access public
        if: steps.gate.outputs.skip != 'true'
