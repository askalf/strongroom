# ClusterFuzzLite — continuous fuzzing of the security-critical parsers
# (broker path canonicalizer + allowlist) and the egress lease fail-closed
# contract. Runs weekly + on demand; a discovered crash fails the job and is
# uploaded as an artifact. Fuzz targets live in ./fuzz, built by
# .clusterfuzzlite/build.sh (Jazzer.js). OpenSSF Scorecard credits the
# Fuzzing check from the .clusterfuzzlite/ config.
name: ClusterFuzzLite

on:
  schedule:
    - cron: '17 3 * * 1' # weekly, Monday 03:17 UTC (staggered off the :00 grid)
  workflow_dispatch:

permissions: read-all

jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [none] # Jazzer.js (pure JS) — no native sanitizer
    steps:
      - name: Build fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: javascript
          sanitizer: ${{ matrix.sanitizer }}
      - name: Run fuzzers (${{ matrix.sanitizer }})
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: 'batch'
          sanitizer: ${{ matrix.sanitizer }}
